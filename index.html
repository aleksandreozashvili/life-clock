<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)">
<meta name="description" content="A live clock showing Aleksandre Ozashvili's age, ticking every second since birth.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life">
<title>Life — Aleksandre</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root {
    --bg: #fafafa;
    --fg: #0a0a0a;
    --muted: #7a7a7a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0a;
      --fg: #f5f5f5;
      --muted: #6a6a6a;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  body {
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: max(env(safe-area-inset-top), 1rem) 1rem max(env(safe-area-inset-bottom), 1rem);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    text-align: center;
  }
  .label {
    font-size: clamp(0.75rem, 2vw, 1rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2.5rem;
  }
  .counter {
    font-size: clamp(2.25rem, 11vw, 7.5rem);
    font-weight: 200;
    letter-spacing: -0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    white-space: nowrap;
    max-width: 100%;
  }
  .counter .small {
    font-size: 0.45em;
    color: var(--muted);
    margin-left: 0.3em;
    font-weight: 300;
  }
  .hint {
    margin-top: 3rem;
    font-size: clamp(0.7rem, 1.6vw, 0.85rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 1;
    transition: opacity 600ms ease;
  }
  .hint.hidden { opacity: 0; }
  .qr {
    position: fixed;
    right: max(env(safe-area-inset-right), 1.25rem);
    bottom: max(env(safe-area-inset-bottom), 1.25rem);
    width: 92px;
    height: 92px;
    padding: 8px;
    background: var(--bg);
    border: 1px solid color-mix(in srgb, var(--fg) 12%, transparent);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: default;
  }
  .qr svg { width: 100%; height: 100%; display: block; shape-rendering: crispEdges; }
  .qr .cap {
    position: absolute;
    top: -1.4em;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  @media (max-width: 480px) {
    .qr { width: 72px; height: 72px; padding: 6px; }
    .qr .cap { font-size: 0.55rem; }
  }
  /* In dark mode, invert the QR code so it stays scannable */
  @media (prefers-color-scheme: dark) {
    .qr svg { filter: invert(1); }
  }
</style>
</head>
<body>
  <div class="label">Aleksandre Ozashvili</div>
  <div id="counter" class="counter">—</div>
  <div id="hint" class="hint">Tap to toggle units</div>

  <a class="qr" href="https://aleksandreozashvili.aisolution.to" aria-label="QR code: open this site" onclick="event.stopPropagation()">
    <span class="cap">scan to share</span>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 37 37">
      <path fill="#ffffff" d="M0 0h37v37H0z"/>
      <path stroke="#000000" d="M4 4.5h7m2 0h1m1 0h1m1 0h1m2 0h5m1 0h7M4 5.5h1m5 0h1m5 0h5m1 0h1m1 0h1m1 0h1m5 0h1M4 6.5h1m1 0h3m1 0h1m1 0h1m1 0h1m1 0h2m2 0h2m2 0h1m1 0h3m1 0h1M4 7.5h1m1 0h3m1 0h1m1 0h3m1 0h3m2 0h1m2 0h1m1 0h1m1 0h3m1 0h1M4 8.5h1m1 0h3m1 0h1m1 0h2m1 0h1m1 0h1m2 0h1m2 0h2m1 0h1m1 0h3m1 0h1M4 9.5h1m5 0h1m1 0h2m3 0h3m1 0h1m2 0h1m1 0h1m5 0h1M4 10.5h7m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h7M12 11.5h1m2 0h1m3 0h2m1 0h1M4 12.5h1m1 0h5m4 0h3m1 0h3m4 0h5M4 13.5h4m1 0h1m2 0h1m1 0h1m1 0h2m2 0h5m1 0h3m3 0h1M4 14.5h2m3 0h2m1 0h3m1 0h5m1 0h1m2 0h1m1 0h1M5 15.5h1m1 0h3m2 0h2m1 0h1m3 0h2m2 0h1m2 0h1m2 0h1m1 0h1M10 16.5h12m1 0h2m4 0h2M4 17.5h3m1 0h1m3 0h2m1 0h2m1 0h1m1 0h9m3 0h1M6 18.5h1m1 0h3m1 0h1m1 0h2m2 0h2m4 0h2m1 0h4M4 19.5h1m1 0h4m3 0h1m1 0h2m2 0h2m1 0h3m2 0h2m2 0h1M6 20.5h1m1 0h3m1 0h1m4 0h2m2 0h1m1 0h1m5 0h2M4 21.5h2m1 0h1m6 0h1m1 0h2m2 0h9m1 0h1m1 0h1M4 22.5h1m2 0h2m1 0h3m1 0h1m1 0h5m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1M4 23.5h1m2 0h2m5 0h2m2 0h1m1 0h1m3 0h4m3 0h1M4 24.5h1m1 0h1m2 0h2m2 0h2m1 0h1m4 0h2m1 0h5m1 0h3M12 25.5h3m2 0h1m2 0h3m1 0h1m3 0h5M4 26.5h7m3 0h2m1 0h5m1 0h2m1 0h1m1 0h3M4 27.5h1m5 0h1m1 0h2m3 0h1m4 0h3m3 0h1M4 28.5h1m1 0h3m1 0h1m1 0h2m1 0h1m2 0h4m2 0h5m1 0h3M4 29.5h1m1 0h3m1 0h1m1 0h1m1 0h1m5 0h1m1 0h1m1 0h1m4 0h4M4 30.5h1m1 0h3m1 0h1m1 0h4m3 0h2m1 0h1m2 0h7M4 31.5h1m5 0h1m3 0h1m4 0h1m3 0h2m2 0h3m1 0h1M4 32.5h7m1 0h1m4 0h2m2 0h1m1 0h1m1 0h1m2 0h1m1 0h1"/>
    </svg>
  </a>

<script>
  // Aleksandre Ozashvili — born 1995-03-30 17:00 Asia/Tbilisi (UTC+4)
  const BIRTH = new Date('1995-03-30T13:00:00Z');

  const elCounter = document.getElementById('counter');
  const elHint = document.getElementById('hint');

  let mode = localStorage.getItem('mode') || 'days';

  function fmtInt(n) { return n.toLocaleString('en-US'); }
  function pad2(n) { return String(n).padStart(2, '0'); }

  function render() {
    const ms = Date.now() - BIRTH.getTime();
    const totalSec = Math.floor(ms / 1000);
    if (mode === 'days') {
      const days = Math.floor(totalSec / 86400);
      const h = Math.floor((totalSec % 86400) / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      elCounter.innerHTML =
        `${fmtInt(days)}<span class="small">d</span> ` +
        `${pad2(h)}<span class="small">h</span> ` +
        `${pad2(m)}<span class="small">m</span> ` +
        `${pad2(s)}<span class="small">s</span>`;
      document.title = `${fmtInt(days)} days — Aleksandre`;
    } else {
      elCounter.innerHTML = `${fmtInt(totalSec)}<span class="small">seconds</span>`;
      document.title = `${fmtInt(totalSec)} seconds — Aleksandre`;
    }
  }

  function tick() {
    render();
    requestAnimationFrame(tick);
  }
  tick();
  // Guaranteed fallback tick even if rAF is throttled
  setInterval(render, 1000);

  document.body.addEventListener('click', () => {
    mode = (mode === 'days') ? 'seconds' : 'days';
    localStorage.setItem('mode', mode);
    render();
    elHint.classList.add('hidden');
  });

  // Register service worker for offline / PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
